<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 15.1: Border Utilities</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Borders and Rounding</h2>

        <div class="d-flex gap-4 align-items-center mb-4">
            <!-- border adds light border, border-primary sets color, border-3 sets thickness -->
            <!-- rounded-circle makes standard image square round into a circle -->
            <div>
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=120&h=120" class="border border-primary border-3 rounded-circle" alt="Circle profile">
                <p class="text-center mt-2">Circle Border</p>
            </div>
            
            <div class="border border-success border-2 p-3 rounded">
                <h5>Box border</h5>
                <p class="mb-0">Success colored border.</p>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-body">
                <h3>What I learned from this exercise:</h3>
                <p>I learned how to add borders and round corners using classes like <code>border-primary</code>, border size settings (<code>border-3</code>), and <code>rounded-circle</code> layout options.</p>
            </div>
        </div>
    </div>
</body>
</html>
