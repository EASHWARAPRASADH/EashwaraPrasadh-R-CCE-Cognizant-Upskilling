<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 6.1: Flexbox Navbar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Responsive Flexbox Navigation Bar</h2>

        <!-- d-flex turns container into a flex container -->
        <!-- flex-column: items stack on mobile -->
        <!-- flex-md-row: items align horizontally on medium screens and up -->
        <div class="d-flex flex-column flex-md-row align-items-center p-3 bg-dark text-white rounded mb-4">
            <span class="fs-4 fw-bold mb-2 mb-md-0">My Logo</span>
            
            <nav class="ms-md-auto">
                <a class="text-white me-3 text-decoration-none" href="#">Home</a>
                <a class="text-white me-3 text-decoration-none" href="#">Features</a>
                <a class="text-white text-decoration-none" href="#">Pricing</a>
            </nav>
        </div>

        <div class="card mt-4">
            <div class="card-body">
                <h3>What I learned from this exercise:</h3>
                <p>I learned how to construct a simple responsive navbar using basic flex utility classes like <code>d-flex</code>, <code>flex-column</code>, and <code>flex-md-row</code> without importing a heavy navbar structure.</p>
            </div>
        </div>
    </div>
</body>
</html>
