<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 16.1: Fixed Position Footer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-bottom: 70px; } /* Prevent footer from covering contents */
    </style>
</head>
<body>
    <div class="container mt-5">
        <h2>Fixed Layout Positioning</h2>
        <p>Scroll down to see content flow underneath the fixed bottom navigation bar.</p>

        <!-- position-fixed anchors element -->
        <!-- bottom-0 pins to the bottom edge -->
        <div class="position-fixed bottom-0 start-0 w-100 bg-dark text-white p-3 text-center">
            Classroom Portal Fixed Footer Status: Online
        </div>

        <div class="card mt-4">
            <div class="card-body">
                <h3>What I learned from this exercise:</h3>
                <p>I learned how to pin elements along page boundary axes using positioning wrappers like <code>position-fixed bottom-0</code>.</p>
            </div>
        </div>
    </div>
</body>
</html>
