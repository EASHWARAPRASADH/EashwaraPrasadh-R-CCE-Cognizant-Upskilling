<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 16.2: Absolute Badge Overlay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Absolute Positioning Overlay Badge</h2>

        <!-- position-relative sets reference coordinates context -->
        <div class="position-relative d-inline-block">
            <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=150&h=150" class="rounded" alt="User Avatar">
            <!-- position-absolute translates element coordinates inside parent context -->
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                New
            </span>
        </div>

        <div class="card mt-4">
            <div class="card-body">
                <h3>What I learned from this exercise:</h3>
                <p>I learned how to overlay badges onto parent containers using relative and absolute coordinates combined with offset classes like <code>translate-middle</code>.</p>
            </div>
        </div>
    </div>
</body>
</html>
