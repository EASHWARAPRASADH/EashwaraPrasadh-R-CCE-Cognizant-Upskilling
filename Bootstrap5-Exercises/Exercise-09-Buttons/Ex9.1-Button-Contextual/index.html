<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 9.1: Button Contextual Styles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Contextual Buttons and Outline Buttons</h2>

        <!-- Contextual colors (btn-primary, btn-secondary, etc.) -->
        <div class="mb-4">
            <h5>Solid Buttons</h5>
            <button class="btn btn-primary">Primary</button>
            <button class="btn btn-secondary">Secondary</button>
            <button class="btn btn-success">Success</button>
            <button class="btn btn-danger">Danger</button>
            <button class="btn btn-warning">Warning</button>
            <button class="btn btn-info">Info</button>
        </div>

        <!-- Outline colors (btn-outline-primary, etc.) -->
        <div class="mb-4">
            <h5>Outline Buttons</h5>
            <button class="btn btn-outline-primary">Primary</button>
            <button class="btn btn-outline-secondary">Secondary</button>
            <button class="btn btn-outline-success">Success</button>
            <button class="btn btn-outline-danger">Danger</button>
            <button class="btn btn-outline-warning">Warning</button>
            <button class="btn btn-outline-info">Info</button>
        </div>

        <div class="card mt-4">
            <div class="card-body">
                <h3>What I learned from this exercise:</h3>
                <p>I learned how to style link tags and action items into solid and outline buttons using contextual modifiers like <code>btn-primary</code> and <code>btn-outline-secondary</code>.</p>
            </div>
        </div>
    </div>
</body>
</html>
