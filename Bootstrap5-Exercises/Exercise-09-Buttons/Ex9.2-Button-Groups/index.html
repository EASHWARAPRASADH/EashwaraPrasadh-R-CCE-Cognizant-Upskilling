<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 9.2: Button Groups and Checkbox Toggles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Button Groups and Toggle Checkboxes</h2>

        <!-- btn-group wraps buttons to display them aligned together -->
        <div class="mb-4">
            <h5>Standard Group</h5>
            <div class="btn-group" role="group">
                <button type="button" class="btn btn-primary">Left</button>
                <button type="button" class="btn btn-primary">Middle</button>
                <button type="button" class="btn btn-primary">Right</button>
            </div>
        </div>

        <div class="mb-4">
            <h5>Checkbox Toggle Button</h5>
            <!-- btn-check makes standard checkbox look like a toggled button -->
            <input type="checkbox" class="btn-check" id="btncheck1" autocomplete="off">
            <label class="btn btn-outline-danger" for="btncheck1">Click to Toggle Danger</label>
        </div>

        <div class="card mt-4">
            <div class="card-body">
                <h3>What I learned from this exercise:</h3>
                <p>I learned how to group multiple buttons using <code>btn-group</code> and how to transform form inputs (checkboxes) into toggleable buttons using the <code>btn-check</code> utility class.</p>
            </div>
        </div>
    </div>
</body>
</html>
