<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 11.1: Profile Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Profile Card Component</h2>

        <!-- card wraps the component content container -->
        <div class="card" style="width: 18rem;">
            <!-- card-img-top adds image alignment at the top boundary -->
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&h=150" class="card-img-top" alt="User Profile">
            <div class="card-body">
                <!-- card-title styles main component header -->
                <h5 class="card-title">John Doe</h5>
                <p class="card-text">Web development student practicing CSS layout design using Bootstrap grids.</p>
                <a href="#" class="btn btn-primary">View Full Profile</a>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-body">
                <h3>What I learned from this exercise:</h3>
                <p>I learned how to construct profile card UI modules using <code>card</code>, <code>card-body</code>, and <code>card-img-top</code> class formatting tools.</p>
            </div>
        </div>
    </div>
</body>
</html>
