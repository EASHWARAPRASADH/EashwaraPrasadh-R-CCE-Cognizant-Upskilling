<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8.1: Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">User Registration Form</h2>

        <form class="p-4 border rounded bg-light">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <!-- input-group wraps text prefix/suffix around an input -->
                <div class="input-group">
                    <span class="input-group-text">@</span>
                    <input type="text" id="username" class="form-control" placeholder="Choose username" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="terms">
                <label class="form-check-label" for="terms">I agree to terms and conditions</label>
            </div>

            <button type="submit" class="btn btn-primary">Submit Registration</button>
        </form>

        <div class="card mt-4">
            <div class="card-body">
                <h3>What I learned from this exercise:</h3>
                <p>I learned how to build inputs and forms using Bootstrap form classes like <code>form-control</code>, checkbox alignment with <code>form-check-input</code>, and input prefixes with <code>input-group-text</code>.</p>
            </div>
        </div>
    </div>
</body>
</html>
