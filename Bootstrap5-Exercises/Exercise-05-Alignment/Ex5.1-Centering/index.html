<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 5.1: Grid Centering</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .tall-row {
            height: 250px;
            background-color: #f8f9fa;
            border: 2px dashed #ccc;
        }
        .box {
            background-color: #ffc107;
            padding: 20px;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Centering Content inside Grid Rows</h2>

        <!-- justify-content-center centers columns horizontally -->
        <!-- align-items-center centers columns vertically -->
        <div class="row tall-row justify-content-center align-items-center mb-4">
            <div class="col-4 text-center">
                <div class="box">Totally Centered Box</div>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-body">
                <h3>What I learned from this exercise:</h3>
                <p>I learned how to use flexbox alignment utilities inside grid rows. Specifically, <code>justify-content-center</code> handles horizontal centering and <code>align-items-center</code> handles vertical centering.</p>
            </div>
        </div>
    </div>
</body>
</html>
