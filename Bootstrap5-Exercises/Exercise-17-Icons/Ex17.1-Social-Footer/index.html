<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 17.1: Footer Icons Integration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Importing Bootstrap Icons library via CDN link -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2>Footer Icon Integration Demo</h2>
        
        <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top">
            <div class="col-md-4 d-flex align-items-center">
                <span class="text-muted">© 2026 Student Lab Inc</span>
            </div>
            
            <ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
                <!-- Using icon classes (bi-twitter, bi-github, etc.) -->
                <li class="ms-3"><a class="text-muted fs-4" href="#"><i class="bi bi-twitter-x"></i></a></li>
                <li class="ms-3"><a class="text-muted fs-4" href="#"><i class="bi bi-instagram"></i></a></li>
                <li class="ms-3"><a class="text-muted fs-4" href="#"><i class="bi bi-github"></i></a></li>
            </ul>
        </footer>

        <div class="card mt-4">
            <div class="card-body">
                <h3>What I learned from this exercise:</h3>
                <p>I learned how to link the Bootstrap Icons font library and embed icons inside layouts using the <code>&lt;i&gt;</code> element and matching class names.</p>
            </div>
        </div>
    </div>
</body>
</html>
