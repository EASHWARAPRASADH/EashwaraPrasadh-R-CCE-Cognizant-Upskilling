<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 17.2: Icon Action Buttons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Action Buttons using Icons</h2>

        <div class="btn-group" role="group">
            <button type="button" class="btn btn-outline-secondary" title="Save Document">
                <i class="bi bi-floppy"></i>
            </button>
            <button type="button" class="btn btn-outline-secondary" title="Edit Entry">
                <i class="bi bi-pencil-square"></i>
            </button>
            <button type="button" class="btn btn-outline-danger" title="Delete Entry">
                <i class="bi bi-trash"></i>
            </button>
        </div>

        <div class="card mt-4">
            <div class="card-body">
                <h3>What I learned from this exercise:</h3>
                <p>I learned how to replace text labels with graphical icon elements inside button triggers for cleaner utility interface components.</p>
            </div>
        </div>
    </div>
</body>
</html>
