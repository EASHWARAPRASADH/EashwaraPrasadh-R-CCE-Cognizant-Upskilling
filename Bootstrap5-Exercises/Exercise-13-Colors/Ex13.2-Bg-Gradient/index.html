<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 13.2: Gradient Backgrounds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Background Gradients</h2>

        <!-- bg-gradient adds a subtle highlight gradient -->
        <div class="p-5 bg-dark bg-gradient text-white rounded text-center">
            <h3>bg-dark with bg-gradient</h3>
            <p>This section uses a dark gradient overlay background for a sleeker styling effect.</p>
        </div>

        <div class="card mt-4">
            <div class="card-body">
                <h3>What I learned from this exercise:</h3>
                <p>I learned how to overlay gradients onto solid background colors using the <code>bg-gradient</code> class for polished interface elements.</p>
            </div>
        </div>
    </div>
</body>
</html>
